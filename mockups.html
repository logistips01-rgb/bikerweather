<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>BikerWeather — Mockups HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:'Rajdhani',sans-serif; overflow-x:hidden; }
h1 { text-align:center; font-size:11px; color:rgba(255,255,255,0.25); letter-spacing:3px; padding:14px 0 6px; text-transform:uppercase; }
.option-title { text-align:center; font-size:10px; color:rgba(255,180,0,0.65); letter-spacing:2px; padding:10px 0 4px; text-transform:uppercase; }
.divider { height:8px; background:#000; }

/* ── MOCKUP CONTAINER ── */
.mockup {
  width:100vw; background:#04050a;
  position:relative; display:flex; flex-direction:column;
  overflow:hidden; border-top:1px solid rgba(255,255,255,0.05);
}

/* ── HORIZONTAL SEGMENT BARS (top) ── */
.top-bars { flex-shrink:0; padding:10px 10px 6px; display:flex; flex-direction:column; gap:5px; }
.bar-row { display:flex; align-items:center; gap:6px; }
.bar-lbl { font-family:'JetBrains Mono',monospace; font-size:8px; width:28px; text-align:right; flex-shrink:0; }
.segs { display:flex; gap:2px; flex:1; height:12px; }
.seg { flex:1; border-radius:2px; }
.bar-val { font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700; width:30px; text-align:left; flex-shrink:0; }

/* ── INFO STRIP (B style) ── */
.info-strip {
  flex-shrink:0; display:flex; border-top:1px solid rgba(255,255,255,0.06);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.info-cell {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:5px 4px;
}
.info-cell + .info-cell { border-left:1px solid rgba(255,255,255,0.05); }
.info-num { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; line-height:1; }
.info-lbl { font-family:'JetBrains Mono',monospace; font-size:6px; letter-spacing:2px; margin-top:2px; opacity:0.55; }

/* ── MID ROW ── */
.mid { flex:1; display:flex; align-items:stretch; min-height:0; }

/* Left stats */
.left-stats {
  width:76px; flex-shrink:0; padding:8px 5px;
  display:flex; flex-direction:column; gap:5px;
  border-right:1px solid rgba(255,255,255,0.05);
}
.stat { display:flex; flex-direction:column; }
.sl { font-family:'JetBrains Mono',monospace; font-size:6px; color:rgba(255,255,255,0.5); letter-spacing:1px; }
.sv { font-size:14px; font-weight:700; color:rgba(255,255,255,0.9); }

/* Center — V lean bars + speed usando grid */
.v-center {
  flex:1; display:flex;
  flex-direction:row; align-items:stretch; justify-content:center;
  gap:6px; min-height:0; overflow:visible;
  padding:4px 6px;
}
.v-col {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:4px; flex-shrink:0;
  overflow:visible;
}
.v-angle { font-size:16px; font-weight:700; color:#ff9500; font-family:'Rajdhani',sans-serif; text-shadow:0 0 10px rgba(255,149,0,0.5); }
.v-track {
  width:20px; flex:1;
  border-radius:2px; overflow:hidden;
  background:rgba(255,149,0,0.07); border:1px solid rgba(255,149,0,0.28);
  display:flex; flex-direction:column; justify-content:flex-end;
}
.v-fill { width:100%; background:linear-gradient(to top,#ff9500,#ffcc00); border-radius:2px 2px 0 0; }
.v-lbl { font-family:'JetBrains Mono',monospace; font-size:7px; color:rgba(255,149,0,0.55); }
/* Inclinación visual con skew — no desplaza el elemento */
.v-col-L .v-track { transform:skewX(10deg); }
.v-col-R .v-track { transform:skewX(-10deg); }

.spd-block {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
}
.spd-num { font-size:clamp(52px,13vw,82px); font-weight:700; color:#fff; line-height:0.9; letter-spacing:-2px; }
.spd-unit { font-size:9px; color:rgba(255,255,255,0.4); letter-spacing:5px; margin-top:1px; }
.gear-box { font-size:40px; font-weight:700; color:#00f0a0; border:1px solid rgba(0,240,160,0.25); border-radius:5px; padding:0 10px; line-height:1.1; margin-top:2px; font-family:'Rajdhani',sans-serif; text-shadow:0 0 20px rgba(0,240,160,0.5); }
.gf-row { font-family:'JetBrains Mono',monospace; font-size:11px; color:#ffb300; margin-top:3px; }

/* ── BOTTOM BAR ── */
.bot { height:34px; display:flex; align-items:center; justify-content:center; gap:8px; border-top:1px solid rgba(255,255,255,0.05); flex-shrink:0; }
.btn { font-family:'JetBrains Mono',monospace; font-size:9px; color:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.12); border-radius:4px; padding:3px 8px; }
.btn.accent { border-color:rgba(255,149,0,0.5); color:rgba(255,149,0,0.9); }

/* mini map placeholder */
.map-ph { flex:1; min-height:0; margin-top:4px; border-top:1px solid rgba(255,85,0,0.08); display:flex; align-items:center; justify-content:center; }
.map-ph span { font-family:'JetBrains Mono',monospace; font-size:8px; color:rgba(255,85,0,0.25); letter-spacing:2px; }
</style>
</head>
<body>
<h1>BikerWeather · Simulación HUD</h1>

<!-- ════════ VERSIÓN COMBINADA A+B+V ════════ -->
<p class="option-title">A+B+V — Barras · Datos · Inclinación en V</p>
<div class="mockup">

  <!-- Barras horizontales de segmentos -->
  <div class="top-bars">
    <div class="bar-row">
      <span class="bar-lbl" style="color:rgba(255,85,0,0.7)">RPM</span>
      <div class="segs" id="segs-rpm-a"></div>
      <span class="bar-val" style="color:rgba(255,85,0,0.9)">8.2k</span>
    </div>
    <div class="bar-row">
      <span class="bar-lbl" style="color:rgba(255,149,0,0.6)">SPD</span>
      <div class="segs" id="segs-spd-a"></div>
      <span class="bar-val" style="color:rgba(255,200,0,0.9)">184</span>
    </div>
  </div>

  <!-- Fila de datos tipo B -->
  <div class="info-strip">
    <div class="info-cell">
      <div class="info-num" style="color:#ff5500">8.2<span style="font-size:0.6em">k</span></div>
      <div class="info-lbl" style="color:#ff5500">RPM</div>
    </div>
    <div class="info-cell">
      <div class="info-num" style="color:#29d9ff">84°</div>
      <div class="info-lbl" style="color:#29d9ff">TEMP</div>
    </div>
    <div class="info-cell">
      <div class="info-num" style="color:rgba(255,255,255,0.75)">12.8</div>
      <div class="info-lbl" style="color:rgba(255,255,255,0.4)">VOLTAJE</div>
    </div>
    <div class="info-cell">
      <div class="info-num" style="color:#00f0a0">3</div>
      <div class="info-lbl" style="color:#00f0a0">MARCHA</div>
    </div>
  </div>

  <!-- Mid row -->
  <div class="mid">

    <!-- Stats izquierda -->
    <div class="left-stats">
      <div class="stat"><span class="sl">SESIÓN</span><span class="sv">12:34</span></div>
      <div class="stat"><span class="sl">CURVAS</span><span class="sv">7</span></div>
      <div class="stat"><span class="sl">V.MÁX</span><span class="sv" style="color:#ff6600">187</span></div>
      <div class="stat"><span class="sl">Â.MÁX</span><span class="sv" style="color:#ffb300">38°</span></div>
      <div class="map-ph"><span>GPS MAP</span></div>
    </div>

    <!-- Centro: V lean + speed -->
    <div class="v-center">

      <!-- Barra L -->
      <div class="v-col v-col-L">
        <span class="v-angle">0°</span>
        <div class="v-track">
          <div class="v-fill" style="height:0%"></div>
        </div>
        <span class="v-lbl">L</span>
      </div>

      <!-- Velocidad central -->
      <div class="spd-block">
        <div class="spd-num">184</div>
        <div class="spd-unit">KM/H</div>
        <div class="gear-box">3</div>
        <div class="gf-row">0.12↑ &nbsp;0.38→ G</div>
      </div>

      <!-- Barra R -->
      <div class="v-col v-col-R">
        <span class="v-angle">34°</span>
        <div class="v-track">
          <div class="v-fill" style="height:42%"></div>
        </div>
        <span class="v-lbl">R</span>
      </div>

    </div>

  </div>

  <!-- Kirk AI bar -->
  <div style="height:22px;display:flex;align-items:center;gap:6px;padding:0 10px;border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0;">
    <span style="font-family:'JetBrains Mono',monospace;font-size:7px;background:rgba(255,149,0,0.15);color:#ff9500;border:1px solid rgba(255,149,0,0.3);border-radius:3px;padding:1px 5px;">AI</span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,0.35);letter-spacing:1px;">RIDING ASSISTANT READY</span>
  </div>

  <!-- Controles -->
  <div class="bot">
    <span class="btn">✕</span>
    <span class="btn">↔ R</span>
    <span class="btn">↕ P</span>
    <span class="btn">⊕</span>
    <span class="btn accent">▶ INICIO</span>
  </div>

</div>

<script>
function buildSegs(id, total, active) {
  const el = document.getElementById(id);
  if (!el) return;
  for (let i = 0; i < total; i++) {
    const s = document.createElement('div');
    s.className = 'seg';
    const on = i < active;
    const red  = i >= Math.floor(total * 0.83);
    const warm = i >= Math.floor(total * 0.67);
    if (on) {
      if (red)       s.style.cssText = 'background:#ff0022;box-shadow:0 0 4px rgba(255,0,30,0.8)';
      else if (warm) s.style.cssText = 'background:#ff5500;box-shadow:0 0 4px rgba(255,85,0,0.6)';
      else { const t=i/(total*0.67); const h=120-t*120; s.style.cssText=`background:hsl(${h},100%,52%);box-shadow:0 0 3px hsla(${h},100%,55%,0.5)`; }
    } else {
      s.style.background = red ? 'rgba(255,30,30,0.18)' : 'rgba(255,255,255,0.07)';
    }
    el.appendChild(s);
  }
}
buildSegs('segs-rpm-a', 24, 16);
buildSegs('segs-spd-a', 24, 20);
</script>
</body>
</html>
